name: whatsapp_clone
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  image_picker: 1.2.1
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  google_sign_in: ^6.2.1
  video_player: ^2.8.6
  file_picker: ^8.0.0
  flutter_sound: ^9.2.13
  permission_handler: ^11.3.1
  cloudinary_public: 0.23.1
  just_audio: ^0.9.36
  flutter_native_splash: ^2.4.1
  scroll_to_index: ^3.0.1
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter_18pt-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#0F0E17"
  color_dark: "#0F0E17"
  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo.png
  android_12:
    color: "#0F0E17"
    color_dark: "#0F0E17"
    image: assets/images/splash_logo.png
    image_dark: assets/images/splash_logo.png
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/images/app_icon.png"